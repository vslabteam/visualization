<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Graph Visualization</title>
    <link rel="stylesheet" href="https://unpkg.com/element-ui@2.15.14/lib/theme-chalk/index.css">
    <!-- 开发环境版本，包含了有帮助的命令行警告 -->
    <script src="https://unpkg.com/vue"></script>
    <!-- import JavaScript -->
    <script src="https://unpkg.com/element-ui@2.15.14/lib/index.js"></script>
  </head>

  <body>

    <!-- 使用antv G6的最新生产环境版本 -->
    <script src="https://gw.alipayobjects.com/os/lib/antv/g6/5.0.21/dist/g6.min.js"></script>

    <!-- 使用jspdf来生成pdf文档 -->
    <script src="https://unpkg.com/jspdf@latest/dist/jspdf.umd.min.js"></script>


    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css"
    integrity="sha512-xodZBNTC5n17Xt2atTPuE1HxjVMSvLVW9ocqUKLsCC5CXdbqCmblAshOMAS6/keqq/sMZMZ19scR4PsZChSR7A=="
    crossorigin=""/>

     <!-- Make sure you put this AFTER Leaflet's CSS -->
 <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"
 integrity="sha512-XQoYMqMTK8LvdxXYG3nZ448hOEQiglfqkJs1NOQV44cWnUrBc8PkAOcXy20w0vlaXaVUearIOBhiXZ5V3ynxwA=="
 crossorigin=""></script>

    <style>
      /* 提示框的样式 */
      .g6-tooltip {
      border: 1px solid #9fc92e;
      border-radius: 4px;
      font-size: 12px;
      color: #8f1b1b;
      background-color: rgba(255, 255, 255, 0.9);
      padding: 10px 8px;
      box-shadow: rgb(33, 165, 66) 0px 0px 10px;
      }

      
    </style>

<div id="main" style="width:1520px">

  <div id="header" style="background-color:#FFA500;text-align:center;">
    <h1 style="margin-bottom:0;">Forensic Visualization Tool</h1>
  </div>
  
  <aside id="ctrlPanel" style="background-color:steelblue;height:660px;width:200px;float:left;">
  <b>Control Panel</b><br>  
  <el-divider></el-divider>


  <b>Layout</b><br>
  <div id="layoutCtrl">

    <select v-model="layoutSelected" @change='changeLayout'>
    <option v-for="option in layoutOptions" v-bind:value="option.value">
        {{ option.text }}
    </option>
      </select>
      
      <br>
      
      <span>Selected: {{layoutSelected}}</span><br><br><br>
    </div>

    <el-divider></el-divider>
    <b>Demo Case</b><br>
    <div id="caseCtrl">
      <select v-model="caseSelected"  @change='changeData'>
          <option v-for="option in caseOptions" v-bind:value="option.value">
          {{ option.text }}
          </option>
      </select>
      <br>
      <span>Selected: {{caseSelected}}</span><br><br><br>
    </div>

    <el-divider></el-divider>
    <b>Behavior</b><br>
    <select id="selector">
      <option value="default">default</option>
      <option value="addNode">addNode</option>
      <option value="addEdge">addEdge</option>
    </select>

  
  </aside>
  


  <div id="graphContainer" style="background-color:#EEEEEE;height:660px;width:1120px;float:left;">
  </div>

  <div id="displayInfo" style="background-color:steelblue;height:660px;width:200px;float:right;">

  <el-divider></el-divider>

  <b>Display Panel</b><br>
  <b>Network</b><br>
  
  <div id="info">
    <span v-bind:title="message">
      
    </span>
  </div>

<div id="elements">

</div>
<br><br>
      

      <el-divider></el-divider>
    <b>Selection</b><br>
    Nodes:<br>
    Edges:<br><br><br>

    <el-divider></el-divider>
    <b>Clicked Item</b><br>
    Number:<br>
    Edges:<br><br><br>


</div>	
  
  <div id="footer" style="background-color:#FFA500;clear:both;text-align:center;"> Demo </div>
  
</div>

<script>
  Vue.use(ELEMENT);

  var numOfNodes=99;
  var numOfEdges=99;

  var app2 = new Vue({
    el: '#info',
    data: {
      message: "",
    }
  });

  app2.message=numOfNodes.toString();

  var layoutCtrlVueObject=new Vue({
    el: '#layoutCtrl',
    data: {
      layoutSelected: 'Force Layout',
      layoutOptions: [
        { text: 'Force Layout', value: 'Force Layout' },
        { text: 'Grid Layout', value: 'Grid Layout' },
        { text: 'Circular Layout', value: 'Circular Layout' },
        { text: 'Random Layout', value: 'Random Layout' },
        { text: 'Fruchterman Layout', value: 'Fruchterman Layout' },
        { text: 'Concentric Layout', value: 'Concentric Layout' },
        { text: 'MDS Layout', value: 'MDS Layout' },
        { text: 'Dagre Layout', value: 'Dagre Layout' },
        { text: 'Radial Layout', value: 'Radial Layout' },
        { text: 'Combo Force Layout', value: 'Combo Force Layout' }
      ]
    },
    methods: {
      changeLayout: function(){
          switch(this.layoutSelected){
              case 'Force Layout':
              {					
                  graph.updateLayout({
                      type: 'force',               // 布局名称
                      preventOverlap: false,        // 布局参数，是否允许重叠
                      linkDistance: 200,            // 布局参数，边长
                      workerEnabled:true,
                    });
                  break;
              };
              case 'Grid Layout':
              {					
                  graph.updateLayout({
                      type: 'grid',
                      begin: [ 0, 0 ],          // 可选，
                      preventOverlap: true,     // 可选，必须配合 nodeSize
                      preventOverlapPdding: 20, // 可选
                      //nodeSize: 30,             // 可选
                      condense: false,          // 可选
                      rows: 5,                  // 可选
                      cols: 5,                  // 可选
                      sortBy: 'degree',        // 可选
                      workerEnabled: true,       // 可选，开启 web-worker
                    });
                  break;
              };
              case 'Circular Layout':
                  {					
                      graph.updateLayout({
                          type: 'circular',
                          //center: [300, 300], // 可选，默认为图的中心
                          radius: 250, // 可选
                          startRadius: 10, // 可选
                          endRadius: 100, // 可选
                          clockwise: false, // 可选
                          divisions: 5, // 可选
                          ordering: 'degree', // 可选
                          angleRatio: 1, // 可选
                          workerEnabled:true,
                        });
                      break;
                  };
              case 'Random Layout':
                  {					
                      graph.updateLayout({
                          type: 'random',
                          width: 300,
                          height: 300,
                          workerEnabled:true,
                          });
                      break;
                  };
              case 'Fruchterman Layout':
                  {					
                      graph.updateLayout({
                          type: 'fruchterman',
                          center: [ 200, 200 ],     // 可选，默认为图的中心
                          gravity: 20,              // 可选
                          speed: 2,                 // 可选
                          clustering: true,         // 可选
                          clusterGravity: 30,       // 可选
                          maxIteration: 2000,       // 可选，迭代次数
                          workerEnabled: true       // 可选，开启 web-worker  }
                          });
                      break;
                  };
                  case 'Concentric Layout':
                      {					
                          graph.updateLayout({
                              type: 'concentric',
                              center: [ 200, 200 ],     // 可选，
                              linkDistance: 50,         // 可选，边长
                              preventOverlap: true,     // 可选，必须配合 nodeSize
                              nodeSize: 30,             // 可选
                              sweep: 10,                // 可选
                              equidistant: false,       // 可选
                              startAngle: 0,            // 可选
                              clockwise: false,         // 可选
                              maxLevelDiff: 10,         // 可选
                              //sortBy: 'degree'          // 可选
                              workerEnabled: true       // 可选，开启 web-worker
                              });
                          break;
                      };
                  case 'MDS Layout':
                      {					
                          graph.updateLayout({
                              type: 'mds',
                              workerEnabled:true,
                              });
                          break;
                      };
                  case 'Dagre Layout':
                      {					
                          graph.updateLayout({
                              type: 'dagre',
                              rankdir: 'LR', // 可选，默认为图的中心
                              align: 'DL', // 可选
                              nodesep: 10, // 可选
                              ranksep: 10, // 可选
                              controlPoints: true, // 可选
                              workerEnabled:true,
                              });
                          break;
                      };		
                  case 'Radial Layout':
                      {					
                          graph.updateLayout({
                              type: 'radial',
                              center: [ 200, 200 ],     // 可选，默认为图的中心
                              linkDistance: 50,         // 可选，边长
                              maxIteration: 1000,       // 可选
                              focusNode: '11',      // 可选
                              unitRadius: 100,          // 可选
                              preventOverlap: true,     // 可选，必须配合 nodeSize
                              nodeSize: 30,             // 可选
                              strictRadial: false,      // 可选
                              workerEnabled: true       // 可选，开启 web-worker
                              });
                          break;
                      };	
                  case 'Combo Force Layout':
                      {					
                          graph.updateLayout({
                              type: 'comboForce',
                              center: [ 600, 600 ],     // 可选，默认为图的中心
                              linkDistance: 50,         // 可选，边长
                              nodeStrength: 30,         // 可选
                              edgeStrength: 0.1,        // 可选
                              workerEnabled:true,
                              onTick: () => {           // 可选
                                  console.log('ticking');
                              },
                              onLayoutEnd: () => {      // 可选
                                  console.log('combo force layout done');
                              }
                              });
                          break;
                      };
                  
          }
      }
    }
  });

  var caseCtrl=new Vue({
    el: '#caseCtrl',
    data: {
        caseSelected: 'Drug Dealer Case',
        caseOptions: [
          { text: 'Simple Case', value: 'Simple Case' },
          { text: 'Read Books Combo Case', value: 'Read Books Combo Case' },
          { text: 'Net Science Case', value: 'Net Science Case' },
          { text: 'Eva Case', value: 'Eva Case' },       
          { text: 'Reduced Twitch Case', value: 'Reduced Twitch Case' },     
          { text: 'Twitch Social Networks Case', value: 'Twitch Social Networks Case' },
          { text: 'Bank Fraud Case', value: 'Bank Fraud Case' },
          { text: 'Insurance Fraud Case', value: 'Insurance Fraud Case' },
          { text: 'Drug Dealer Case', value: 'Drug Dealer Case' },
             
          ]
        },

    methods: {
        changeData: function(){
                    //拉取对应案例的数据并进行可视化
                    visualizeDatafromFileUrl(this.caseSelected);
                    switch(this.caseSelected){            
                      case 'Simple Case':                       
                            layoutCtrlVueObject.layoutSelected="Force Layout";	 
                            break; 
                        case 'Read Books Combo Case':
                            layoutCtrlVueObject.layoutSelected="Combo Force Layout";	              
                            break;
                        case 'Net Science Case':
                          layoutCtrlVueObject.layoutSelected="Force Layout";	
                          break;      
                        case 'Eva Case':              
                            layoutCtrlVueObject.layoutSelected="Force Layout";                  
                        break;            
                        case 'Reduced Twitch Case':
                            layoutCtrlVueObject.layoutSelected="Force Layout";	                  
                            break;              
                        case 'Twitch Social Networks Case':              
                            layoutCtrlVueObject.layoutSelected="Force Layout";	                 
                            break;      
                        case 'Bank Fraud Case':              
                            layoutCtrlVueObject.layoutSelected="Force Layout";	                 
                            break;  
                        case 'Insurance Fraud Case':              
                            layoutCtrlVueObject.layoutSelected="Force Layout";	                 
                            break;    
                        case 'Drug Dealer Case':              
                            layoutCtrlVueObject.layoutSelected="Force Layout";	                 
                        break;                                                        
                    }
                    return this.caseSelected;
                    }
            }
    });

  // 后续的脚本代码保持不变
  // ...（此处省略其他代码，为了简洁起见）

</script>
</body>
</html>
